name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit + API tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Dummy values so the build step doesn't fail on missing secrets —
          # this only verifies the app builds, it doesn't need real keys.
          # Real deploys (Vercel) get real values from their own env config.
          NEXTAUTH_SECRET: ci-build-placeholder-secret-not-for-production
          NEXTAUTH_URL: http://localhost:3000
